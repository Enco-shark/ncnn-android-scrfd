plugins {
    id 'com.android.application'
}
android {
    namespace 'com.enco.shark.scrfdncnn'
    compileSdk 36

    defaultConfig {
        applicationId "com.enco.shark.scrfdncnn"

        minSdkVersion 24
        targetSdkVersion 36

        externalNativeBuild {
            cmake {
                arguments "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
            }
        }

        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a'
        }
    }

    externalNativeBuild {
        cmake {
            version "3.22.1"
            path file('src/main/jni/CMakeLists.txt')
        }
    }

    packaging {
        jniLibs {
            useLegacyPackaging true
        }
    }
}

dependencies {
    implementation 'androidx.core:core:1.12.0'
}